name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned validation dependencies
        run: python3 -m pip install --disable-pip-version-check PyYAML==6.0.2
      - name: Run unified repository validation
        run: make test
