contract_id: measurement-foundation
contract_version: "1.0.0"
record_kinds:
  - canonical-measurement-dimension
  - canonical-unit-definition
schema:
  path: repository/data/schemas/measurement.schema.json
  draft: "https://json-schema.org/draft/2020-12/schema"
registries:
  dimensions: repository/data/registries/measurement-dimensions.yaml
  units: repository/data/registries/attribute-units.yaml
dependencies:
  data_types: repository/data/registries/attribute-data-types.yaml
  statuses: repository/data/registries/product-statuses.yaml
canonical_naming:
  dimension_id:
    format: 'dimension:<12-lowercase-hex>'
    pattern: '^dimension:[0-9a-f]{12}$'
    immutable: true
  dimension_key:
    format: lower_snake_case
    pattern: '^[a-z][a-z0-9]*(?:_[a-z0-9]+)*$'
  unit_id:
    format: 'unit:<12-lowercase-hex>'
    pattern: '^unit:[0-9a-f]{12}$'
    immutable: true
  unit_key:
    format: lower_snake_case
    pattern: '^[a-z][a-z0-9]*(?:_[a-z0-9]+)*$'
  symbol:
    format: one_non_whitespace_token
    pattern: '^\S{1,16}$'
required_dimension_fields:
  - contract_version
  - dimension_id
  - dimension_key
  - canonical_name
  - description
  - base_unit_id
  - status
  - owner
  - provenance
  - record_version
required_unit_fields:
  - contract_version
  - unit_id
  - unit_key
  - canonical_name
  - symbol
  - dimension_id
  - is_base_unit
  - base_unit_id
  - conversion_to_base
  - allowed_data_types
  - precision
  - status
  - owner
  - provenance
  - record_version
owner_model:
  type: object
  required_fields:
    - role
  role_pattern: '^[a-z][a-z0-9-]{2,63}$'
provenance_model:
  type: object
  required_fields:
    - source_type
    - source_reference
    - captured_by
    - captured_at
    - evidence_status
  source_type_pattern: '^[A-Z][A-Z0-9_]*$'
  captured_by_pattern: '^role:[a-z][a-z0-9-]{2,63}$'
  evidence_status_pattern: '^[A-Z][A-Z0-9_]*$'
base_unit_rules:
  relationship_model: direct_to_dimension_base
  exactly_one_base_unit_per_dimension: true
  base_unit_self_reference: required
  non_base_self_reference: prohibited
  cross_dimension_reference: prohibited
  cyclic_relationships: prohibited
conversion_model:
  formula: 'base_value = value * multiplier.numerator / multiplier.denominator + offset.numerator / offset.denominator'
  numeric_representation: integer_rational
  normalized_fractions_required: true
  positive_multiplier_required: true
  positive_denominator_required: true
  base_unit_multiplier:
    numerator: 1
    denominator: 1
  base_unit_offset:
    numerator: 0
    denominator: 1
precision_model:
  maximum_decimal_places:
    minimum: 0
    maximum: 12
  rounding_modes:
    - HALF_EVEN
  binary_floating_point_metadata: prohibited
compatibility:
  unit_capable_data_types:
    - INTEGER
    - DECIMAL
  rules:
    - Every Unit must declare at least one allowed data type.
    - Allowed data types must exist and declare unit support.
    - Product Attribute Unit references must resolve to a compatible Unit definition.
data_boundary:
  product_records_allowed: false
  sku_records_allowed: false
  product_values_allowed: false
  business_specific_values_allowed: false
  pricing_allowed: false
  runtime_mappings_allowed: false
  import_allowed: false
  publishing_allowed: false
  deployment_allowed: false
prohibited_fields:
  - product_id
  - entity_id
  - sku
  - commercial_sku
  - product_value
  - allowed_values
  - wordpress_id
  - woocommerce_id
  - variation_id
  - price
  - pricing
  - cost
  - margin
  - stock
  - inventory
  - availability
  - offer
  - cart
  - checkout
  - payment
  - publication
  - publishing
  - deployment
